  </div>

<main class="wrap">

  <section class="section" id="all-reports">
    <div class="section-head">
      <h2>&#9612; All Reports</h2>
      <span class="note" id="reports-note"></span>
    </div>
    <div id="reports-wrap">
      <div class="loading">Loading reports...</div>
    </div>
  </section>

</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="desk.js"></script>
<script>
(function () {
  "use strict";
  var D = window.Desk;

  D.mountFooter(document.getElementById("site-footer"));

  function reportPath(r) {
    if (r.file) return "data/" + String(r.file).replace(/^\/+/, "");
    if (r.path) return r.path;
    return "data/reports/" + r.date + ".md";
  }

  function fileKeyOf(r) {
    // the fragment id we deep-link with is the raw "file" (or derived path), sans data/ prefix
    if (r.file) return String(r.file).replace(/^\/+/, "");
    if (r.path) return String(r.path).replace(/^data\//, "");
    return "reports/" + r.date + ".md";
  }

  function typeLabel(r) {
    if (r.type === "research") return "Research";
    if (r.type === "watchdog") return "Watchdog";
    if (r.type === "desk") return "Desk";
    return r.type ? D.esc(r.type) : "Report";
  }

  var reportsCache = [];

  function renderReports(index) {
    var wrap = document.getElementById("reports-wrap");
    var reports = (index && Array.isArray(index.reports)) ? index.reports.slice() : [];
    if (!reports.length) {
      wrap.innerHTML = '<div class="empty">No reports yet. The office writes here once Actions are live.</div>';
      return;
    }
    reports.sort(function (a, b) { return String(b.date).localeCompare(String(a.date)); });
    reportsCache = reports;

    document.getElementById("reports-note").textContent = reports.length + " report" + (reports.length === 1 ? "" : "s") + " on file";

    wrap.innerHTML = '<div class="report-list" id="reports-list">' + reports.map(function (r, i) {
      var key = fileKeyOf(r);
      return '<div class="report-item" data-idx="' + i + '" data-key="' + D.esc(key) + '">' +
        '<span class="date">' + D.esc(r.date || "") + '</span>' +
        '<span class="pill">' + typeLabel(r) + '</span>' +
        '<span class="title">' + D.esc(r.title || "Report") + '</span>' +
        '</div>' +
        '<div class="report-view" id="report-body-' + i + '" hidden></div>';
    }).join("") + '</div>';

    wrap.querySelectorAll(".report-item").forEach(function (item) {
      item.addEventListener("click", function () {
        var key = item.getAttribute("data-key");
        location.hash = key;
      });
    });

    // if a hash was already present (deep link on load), open it now
    openFromHash();
  }

  function closeAllBodies() {
    document.querySelectorAll(".report-view").forEach(function (el) {
      el.hidden = true;
      el.innerHTML = "";
      el.removeAttribute("data-loaded");
    });
  }

  function openFromHash() {
    var hash = decodeURIComponent(String(location.hash || "").replace(/^#/, ""));
    if (!hash || !reportsCache.length) return;
    var idx = -1;
    for (var i = 0; i < reportsCache.length; i++) {
      if (fileKeyOf(reportsCache[i]) === hash) { idx = i; break; }
    }
    if (idx < 0) return;
    var r = reportsCache[idx];
    var path = reportPath(r);
    var bodyEl = document.getElementById("report-body-" + idx);
    if (!bodyEl) return;
    closeAllBodies();
    bodyEl.hidden = false;
    bodyEl.innerHTML = '<div class="loading">Loading report...</div>';
    fetch(path, { cache: "no-store" }).then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.text();
    }).then(function (md) {
      bodyEl.innerHTML = '<button type="button" class="report-close" id="rp-close-' + idx + '">Close report</button>' + D.mdToHtml(md);
      var closeBtn = document.getElementById("rp-close-" + idx);
      if (closeBtn) closeBtn.addEventListener("click", function () {
        bodyEl.hidden = true;
        bodyEl.innerHTML = "";
        if (location.hash) history.replaceState(null, "", location.pathname + location.search);
      });
      bodyEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }).catch(function () {
      bodyEl.innerHTML = '<button type="button" class="report-close" id="rp-close-' + idx + '">Close</button><p class="dim">Could not load that report.</p>';
      var closeBtn = document.getElementById("rp-close-" + idx);
      if (closeBtn) closeBtn.addEventListener("click", function () { bodyEl.hidden = true; bodyEl.innerHTML = ""; });
    });
  }

  window.addEventListener("hashchange", openFromHash);

  D.loadJSON("https://qbyars08-ui.github.io/yb-desk/data/reports-index.json").then(renderReports).catch(function () {
    document.getElementById("reports-wrap").innerHTML = '<div class="empty">Could not load reports.</div>';
  });

})();
</script>
