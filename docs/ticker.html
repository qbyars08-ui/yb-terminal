<title>Young Bull, Ticker</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Per-ticker view on the yb-desk. Live quote, thesis if it is in Quinn's book, price history, next earnings, and the latest research brief.">
<meta property="og:title" content="yb-desk, Ticker">
<meta property="og:description" content="Per-ticker view on the yb-desk. Live quote, thesis if it is in Quinn's book, price history, next earnings, and the latest research brief.">
<meta property="og:image" content="https://qbyars08-ui.github.io/yb-desk/og-card.png">
<meta property="og:url" content="https://qbyars08-ui.github.io/yb-desk/ticker.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://qbyars08-ui.github.io/yb-desk/og-card.png">
<link rel="stylesheet" href="desk.css">

<header class="site-header">
  <div class="wrap">
    <div class="brand">
      <span class="mark">YB-DESK</span>
      <span class="sub">Ticker</span>
    </div>
    <nav class="nav">
      <a href="index.html">Desk</a>
      <a href="research.html">Research</a>
      <a href="reports.html">Reports</a>
      <a href="members.html">Members</a>
      <a href="about.html">How it works</a>
      <a href="https://github.com/qbyars08-ui/yb-desk" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
</header>

<section class="hero" id="ticker-hero">
  <div class="wrap" id="ticker-hero-wrap">
    <div class="loading">Loading...</div>
  </div>
</section>

<main class="wrap" id="ticker-main" hidden>

  <!-- THESIS -->
  <section class="section" id="thesis-section">
    <div class="section-head">
      <h2>&#9612; Thesis</h2>
    </div>
    <div id="thesis-wrap"></div>
  </section>

  <!-- TECHNICAL READ (momentum engine) -->
  <section class="section" id="techread-section" hidden>
    <div class="section-head">
      <h2>&#9612; Technical Read</h2>
      <span class="note" id="techread-note"></span>
    </div>
    <div id="techread-wrap"></div>
  </section>

  <!-- FUNDAMENTALS -->
  <section class="section" id="fundamentals-section">
    <div class="section-head">
      <h2>&#9612; Snapshot</h2>
      <span class="note" id="fundamentals-note"></span>
    </div>
    <div id="fundamentals-wrap"><div class="loading">Loading...</div></div>
  </section>

  <!-- PRICE HISTORY -->
  <section class="section" id="history-section">
    <div class="section-head">
      <h2>&#9612; Price History, 1 Year</h2>
    </div>
    <div id="history-wrap"></div>
  </section>

  <!-- NEXT EARNINGS -->
  <section class="section" id="earnings-section">
    <div class="section-head">
      <h2>&#9612; Next Earnings</h2>
    </div>
    <div id="earnings-wrap"></div>
  </section>

  <!-- LATEST NEWS -->
  <section class="section" id="news-section">
    <div class="section-head">
      <h2>&#9612; Latest News</h2>
    </div>
    <div id="news-wrap"><div class="loading">Loading...</div></div>
  </section>

  <!-- LATEST RESEARCH BRIEF -->
  <section class="section" id="brief-section">
    <div class="section-head">
      <h2>&#9612; Latest Research Brief</h2>
    </div>
    <div id="brief-wrap">
      <div class="loading">Loading...</div>
    </div>
  </section>

</main>

<div class="wrap" id="ticker-empty" hidden>
  <div class="empty">No ticker given. Open any name from the <a href="index.html">Desk</a>.</div>
</div>

<footer class="site-footer" id="site-footer"></footer>

<script src="desk.js"></script>
<script>
(function () {
  "use strict";
  var D = window.Desk;
  var TICKER_RE = /^[A-Z][A-Z0-9.\-]{0,11}$/;
  var QUOTES_API = "https://young-bull-site.vercel.app/api/quotes?tickers=";
  var EARNINGS_API = "https://young-bull-site.vercel.app/api/earnings-calendar?tickers=";
  var NEWS_API = "https://young-bull-site.vercel.app/api/ticker-news?tickers=";
  var FUNDAMENTALS_API = "https://young-bull-site.vercel.app/api/fundamentals?ticker=";

  D.mountFooter(document.getElementById("site-footer"));

  function getParam(name) {
    var q = window.location.search || "";
    var m = q.match(new RegExp("[?&]" + name + "=([^&]*)"));
    return m ? decodeURIComponent(m[1].replace(/\+/g, " ")) : "";
  }

  var rawTicker = getParam("t");
  var ticker = String(rawTicker || "").trim().toUpperCase();
  var validTicker = TICKER_RE.test(ticker);

  if (!validTicker) {
    document.getElementById("ticker-empty").hidden = false;
    document.getElementById("ticker-hero").hidden = true;
    document.getElementById("ticker-main").hidden = true;
  } else {
    document.title = "yb-desk, " + ticker;
    document.getElementById("ticker-main").hidden = false;
    boot();
  }

  // ============ HERO ============
  function renderHero(book, prices) {
    var wrap = document.getElementById("ticker-hero-wrap");
    var positions = (book && Array.isArray(book.positions)) ? book.positions : [];
    var pos = null;
    for (var i = 0; i < positions.length; i++) {
      if (positions[i] && String(positions[i].t || "").toUpperCase() === ticker) { pos = positions[i]; break; }
    }

    var quote = null;
    var pQuotes = (prices && prices.quotes) ? prices.quotes : {};
    if (pQuotes[ticker] && typeof pQuotes[ticker].price === "number") {
      quote = pQuotes[ticker];
    }

    var pills = "";
    if (pos) {
      pills = (pos.sleeve ? '<span class="pill">' + D.esc(pos.sleeve) + '</span> ' : "") +
        (pos.layer ? '<span class="pill layer">' + D.esc(pos.layer) + '</span>' : "");
    }

    var quoteLine = quoteLineHtml(quote);

    wrap.innerHTML =
      '<p class="lead"><strong style="font-family:var(--mono);font-size:1.6rem;color:var(--text)">' +
      D.esc(ticker) + '</strong></p>' +
      '<p class="lead" id="hero-quote-line">' + quoteLine + '</p>' +
      (pills ? '<p class="lead">' + pills + '</p>' : "");

    if (!quote) {
      fetchLiveQuote();
    }
  }

  function quoteLineHtml(quote) {
    if (quote && typeof quote.price === "number") {
      var pctCls = D.pctClass(quote.changePct);
      var pctTxt = (typeof quote.changePct === "number") ? D.fmtPct(quote.changePct) : "-";
      return '<span class="mono">' + D.esc(D.fmtPrice(quote.price)) + '</span> ' +
        '<span class="mono ' + pctCls + '">' + D.esc(pctTxt) + '</span>';
    }
    return '<span class="faint">-</span>';
  }

  function fetchLiveQuote() {
    var el = document.getElementById("hero-quote-line");
    fetch(QUOTES_API + encodeURIComponent(ticker)).then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function (data) {
      var q = data && data.ok && data.quotes ? data.quotes[ticker] : null;
      if (el) el.innerHTML = quoteLineHtml(q);
    }).catch(function () {
      if (el) el.innerHTML = '<span class="faint">-</span>';
    });
  }

  // Your private note for this ticker, read from the desk's localStorage
  // (same origin). Shown here read-only; you edit it on the Desk.
  function userNoteFor(t) {
    try {
      var m = JSON.parse(localStorage.getItem("ybdesk.notes.v1") || "{}");
      var note = m && m[String(t).toUpperCase()];
      return (typeof note === "string" && note.trim()) ? note.trim() : null;
    } catch (e) { return null; }
  }
  function userNoteBlock() {
    var note = userNoteFor(ticker);
    if (!note) return "";
    return '<div class="detail-block"><div class="lab">Your note</div>' +
      '<div class="body" style="white-space:pre-wrap">' + D.esc(note) + '</div>' +
      '<div class="hint" style="margin-top:4px">Private to your browser. Edit it on the <a href="index.html">Desk</a>.</div></div>';
  }

  // ============ THESIS ============
  function renderThesis(book) {
    var wrap = document.getElementById("thesis-wrap");
    var positions = (book && Array.isArray(book.positions)) ? book.positions : [];
    var pos = null;
    for (var i = 0; i < positions.length; i++) {
      if (positions[i] && String(positions[i].t || "").toUpperCase() === ticker) { pos = positions[i]; break; }
    }

    if (!pos) {
      var noteOnly = userNoteBlock();
      wrap.innerHTML = noteOnly
        ? '<div class="detail-inner">' + noteOnly + '</div>'
        : '<div class="empty">Not in Quinn\'s book. Add your own note on the <a href="index.html">Desk</a>.</div>';
      return;
    }

    var blocks = [];
    if (pos.thesis) {
      blocks.push('<div class="detail-block"><div class="lab">Thesis</div><div class="body">' + D.esc(pos.thesis) + '</div></div>');
    }
    if (pos.variantPerception) {
      blocks.push('<div class="detail-block"><div class="lab">Variant perception</div><div class="body">' + D.esc(pos.variantPerception) + '</div></div>');
    }
    var kv = Array.isArray(pos.killVectors) ? pos.killVectors : [];
    if (kv.length) {
      var items = kv.map(function (k) {
        if (typeof k === "string") return '<li>' + D.esc(k) + '</li>';
        var title = k && k.title ? '<b>' + D.esc(k.title) + ':</b> ' : '';
        var body = k && k.body ? D.esc(k.body) : '';
        return '<li>' + title + body + '</li>';
      }).join("");
      blocks.push('<div class="detail-block"><div class="lab">Kill vectors</div><ul class="kill-list">' + items + '</ul></div>');
    }
    if (pos.note) {
      blocks.push('<div class="detail-block"><div class="lab">Note</div><div class="body">' + D.esc(pos.note) + '</div></div>');
    }
    if (!blocks.length) {
      blocks.push('<div class="detail-block"><div class="body dim">No thesis detail on file for this position.</div></div>');
    }
    var mine = userNoteBlock();
    if (mine) blocks.push(mine);
    wrap.innerHTML = '<div class="detail-inner">' + blocks.join("") + '</div>';
  }

  // ============ PRICE HISTORY ============
  function renderHistory(history) {
    var wrap = document.getElementById("history-wrap");
    var series = (history && history.series) ? history.series : {};
    if (!series[ticker] || !Array.isArray(series[ticker]) || !series[ticker].length) {
      wrap.innerHTML = '<div class="empty">No price history on file for this name. History covers Quinn\'s book names.</div>';
      return;
    }

    var list = [{ points: D.normalizePct(series[ticker]), cls: "primary", label: ticker }];
    if (Array.isArray(series.SPY) && series.SPY.length) {
      list.push({ points: D.normalizePct(series.SPY), cls: "muted", label: "SPY" });
    }

    wrap.innerHTML = '<div id="history-chart"></div>' +
      '<p class="spark-note">Daily closes, indexed to the start of the window.</p>';
    document.getElementById("history-chart").innerHTML = D.sparkSVG(list, { unit: "%" });
  }

  // ============ NEXT EARNINGS ============
  function renderEarnings() {
    var wrap = document.getElementById("earnings-wrap");
    wrap.innerHTML = '<div class="loading">Loading...</div>';
    fetch(EARNINGS_API + encodeURIComponent(ticker)).then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function (data) {
      var entry = (data && data.ok && data.earnings) ? data.earnings[ticker] : null;
      var dateStr = entry && entry.reportDate ? entry.reportDate : null;
      if (!dateStr) {
        wrap.innerHTML = '<div class="empty">No scheduled report date on file.</div>';
        return;
      }
      var d = new Date(dateStr + "T00:00:00");
      if (isNaN(d.getTime())) {
        wrap.innerHTML = '<div class="empty">No scheduled report date on file.</div>';
        return;
      }
      var monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      var label = monthNames[d.getMonth()] + " " + d.getDate();
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var msPerDay = 24 * 60 * 60 * 1000;
      var daysAway = Math.round((d.getTime() - today.getTime()) / msPerDay);
      wrap.innerHTML = '<p class="mono">Reports ' + D.esc(label) + ' (in ' + D.esc(String(daysAway)) + 'd)</p>';
    }).catch(function () {
      wrap.innerHTML = '<div class="empty">No scheduled report date on file.</div>';
    });
  }

  // ============ SNAPSHOT (fundamentals) ============
  function fmtBig(v) {
    var n = Number(v);
    if (!isFinite(n) || n <= 0) return null;
    // API returns market cap in millions.
    if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + "T";
    if (n >= 1e3) return "$" + (n / 1e3).toFixed(1) + "B";
    return "$" + Math.round(n) + "M";
  }
  function fmtNum(v, suffix) {
    var n = Number(v);
    if (!isFinite(n)) return null;
    return n.toFixed(1) + (suffix || "");
  }
  function statCell(k, v, cls) {
    if (v === null || v === undefined) return "";
    return '<div class="stat"><div class="k">' + D.esc(k) + '</div>' +
      '<div class="v ' + (cls || "") + '">' + D.esc(v) + '</div></div>';
  }

  function renderFundamentals() {
    var wrap = document.getElementById("fundamentals-wrap");
    var note = document.getElementById("fundamentals-note");
    fetch(FUNDAMENTALS_API + encodeURIComponent(ticker)).then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function (data) {
      var m = (data && data.metrics) || {};
      var p = (data && data.profile) || {};
      var cells = [
        statCell("Market cap", fmtBig(m.marketCap)),
        statCell("P/E (ttm)", fmtNum(m.peRatioTTM)),
        statCell("P/S (ttm)", fmtNum(m.psRatioTTM)),
        statCell("Gross margin", fmtNum(m.grossMargin, "%")),
        statCell("Net margin", fmtNum(m.netMargin, "%")),
        statCell("Rev growth YoY", fmtNum(m.revenueGrowthTTMYoy, "%"),
          (Number(m.revenueGrowthTTMYoy) >= 0 ? "gain" : "loss")),
        statCell("52w low", (isFinite(Number(m.low52w)) ? D.fmtPrice(Number(m.low52w)) : null)),
        statCell("52w high", (isFinite(Number(m.high52w)) ? D.fmtPrice(Number(m.high52w)) : null)),
        statCell("Beta", fmtNum(m.beta))
      ].filter(Boolean);

      if (!cells.length) {
        wrap.innerHTML = '<div class="empty">No fundamentals on file for this name right now.</div>';
        return;
      }
      var exch = "";
      if (p.exchange) {
        var u = String(p.exchange).toUpperCase();
        exch = u.indexOf("NASDAQ") !== -1 ? "NASDAQ"
          : (u.indexOf("NEW YORK") !== -1 || u.indexOf("NYSE") !== -1) ? "NYSE"
          : String(p.exchange).split(/[\s,\-]/)[0];
      }
      if (p.industry || exch) note.textContent = [p.industry, exch].filter(Boolean).join(" · ");
      wrap.innerHTML = '<div class="stat-grid">' + cells.join("") + '</div>';
    }).catch(function () {
      wrap.innerHTML = '<div class="empty">Fundamentals are not available right now.</div>';
    });
  }

  // ============ TECHNICAL READ (signals.json, book + watch names) ============
  function renderTechRead() {
    D.loadJSON("https://qbyars08-ui.github.io/yb-desk/data/signals.json").then(function (sig) {
      var s = sig && sig.signals ? sig.signals[ticker] : null;
      if (!s || s.error) return; // engine only covers book + watchlist names
      var wrap = document.getElementById("techread-wrap");
      var sec = document.getElementById("techread-section");
      var scoreCls = s.score >= 66 ? "gain" : s.score <= 40 ? "loss" : "flat";
      var trendCls = /uptrend/.test(s.trend) ? "gain" : /downtrend/.test(s.trend) ? "loss" : "flat";
      var parts = [];
      parts.push('<span class="sig-chip"><span class="sig-k">Trend</span> <span class="' + trendCls + '">' + D.esc(s.trend) + '</span></span>');
      parts.push('<span class="sig-chip"><span class="sig-k">Momentum</span> <span class="mono ' + scoreCls + '">' + D.esc(String(s.score)) + '/100</span></span>');
      if (typeof s.rsi === "number") parts.push('<span class="sig-chip"><span class="sig-k">RSI</span> <span class="mono">' + D.esc(String(s.rsi)) + '</span> ' + D.esc(s.rsiNote || "") + '</span>');
      if (typeof s.adx === "number") parts.push('<span class="sig-chip"><span class="sig-k">Trend strength</span> <span class="mono">' + D.esc(String(s.adx)) + '</span> ' + D.esc(s.adxNote || "") + '</span>');
      if (s.diDir) parts.push('<span class="sig-chip"><span class="sig-k">Direction</span> <span class="' + (s.diDir === "bull" ? "gain" : "loss") + '">' + (s.diDir === "bull" ? "buyers" : "sellers") + '</span></span>');
      if (s.macdDir) parts.push('<span class="sig-chip"><span class="sig-k">MACD</span> <span class="' + (s.macdDir === "rising" ? "gain" : "loss") + '">' + D.esc(s.macdDir) + '</span></span>');
      if (typeof s.atrPct === "number") parts.push('<span class="sig-chip"><span class="sig-k">Volatility</span> <span class="mono">' + D.esc(String(s.atrPct)) + '%</span> ATR</span>');
      wrap.innerHTML = '<div class="sig-row">' + parts.join("") + '</div>' +
        (s.analysis ? '<p style="margin:10px 0 0;font-size:0.88rem">' + D.esc(s.analysis) + '</p>' : '') +
        '<p class="hint" style="margin-top:6px">Powered by the mphinance momentum engine, refreshed twice a day. Descriptive, not advice.</p>';
      if (sig.updated) document.getElementById("techread-note").textContent = "as of " + D.fmtAsOf(sig.updated);
      sec.hidden = false;
    }).catch(function () { /* optional section */ });
  }

  // ============ LATEST NEWS ============
  function timeAgo(iso) {
    if (!iso) return "";
    var then = new Date(iso).getTime();
    if (!isFinite(then)) return "";
    var mins = Math.round((Date.now() - then) / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return mins + "m ago";
    var hrs = Math.round(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    return Math.round(hrs / 24) + "d ago";
  }

  function renderNews() {
    var wrap = document.getElementById("news-wrap");
    fetch(NEWS_API + encodeURIComponent(ticker)).then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function (data) {
      var items = (data && data.ok && data.news && Array.isArray(data.news[ticker])) ? data.news[ticker] : [];
      if (!items.length) {
        wrap.innerHTML = '<div class="empty">No fresh headlines on this name right now.</div>';
        return;
      }
      wrap.innerHTML = '<ul class="news-list">' + items.map(function (n) {
        var meta = [n.source, timeAgo(n.publishedAt)].filter(Boolean).map(D.esc).join(" &middot; ");
        return '<li>' +
          '<a href="' + encodeURI(String(n.url)) + '" target="_blank" rel="noopener nofollow">' + D.esc(n.title) + '</a>' +
          (meta ? '<span class="news-meta">' + meta + '</span>' : '') +
          '</li>';
      }).join("") + '</ul>';
    }).catch(function () {
      wrap.innerHTML = '<div class="empty">Headlines are not available right now.</div>';
    });
  }

  // ============ LATEST RESEARCH BRIEF ============
  function isResearch(r) {
    if (r.type === "research") return true;
    var f = r.file || r.path || "";
    return /(^|\/)research-/.test(String(f));
  }

  function matchesTicker(r) {
    if (r.ticker && String(r.ticker).toUpperCase() === ticker) return true;
    var f = String(r.file || r.path || "");
    var re = new RegExp("(^|[^A-Z0-9])" + ticker + "([^A-Z0-9]|$)");
    return re.test(f);
  }

  function briefPath(r) {
    if (r.file) return "data/" + String(r.file).replace(/^\/+/, "");
    if (r.path) return r.path;
    return "data/reports/" + r.date + ".md";
  }

  function renderBrief(index) {
    var wrap = document.getElementById("brief-wrap");
    var all = (index && Array.isArray(index.reports)) ? index.reports : [];
    var matches = all.filter(isResearch).filter(matchesTicker);

    if (!matches.length) {
      wrap.innerHTML = '<div class="empty">No brief on file yet for this name. ' +
        '<a href="research.html?t=' + encodeURIComponent(ticker) + '">Task the desk</a> and one lands here in minutes.</div>';
      return;
    }

    matches.sort(function (a, b) { return String(b.date).localeCompare(String(a.date)); });
    var latest = matches[0];
    var path = briefPath(latest);

    wrap.innerHTML = '<div class="loading">Loading brief...</div>';
    fetch(path, { cache: "no-store" }).then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.text();
    }).then(function (md) {
      wrap.innerHTML = '<div class="report-view">' + D.mdToHtml(md) + '</div>' +
        '<p class="hint" style="margin-top:10px">Want a fresh take? <a href="research.html?t=' + encodeURIComponent(ticker) + '">Task the desk about ' + D.esc(ticker) + '</a>, a new brief lands in minutes.</p>';
    }).catch(function () {
      wrap.innerHTML = '<div class="empty">No brief on file yet for this name. ' +
        '<a href="research.html?t=' + encodeURIComponent(ticker) + '">Task the desk</a> and one lands here in minutes.</div>';
    });
  }

  // ============ BOOT ============
  function boot() {
    var bookP = D.loadJSON("https://qbyars08-ui.github.io/yb-desk/data/book.json").catch(function () { return null; });
    var pricesP = D.loadJSON("https://qbyars08-ui.github.io/yb-desk/data/prices.json").catch(function () { return null; });
    var historyP = D.loadJSON("https://qbyars08-ui.github.io/yb-desk/data/history.json").catch(function () { return null; });
    var reportsP = D.loadJSON("https://qbyars08-ui.github.io/yb-desk/data/reports-index.json").catch(function () { return null; });

    Promise.all([bookP, pricesP]).then(function (results) {
      renderHero(results[0], results[1]);
      renderThesis(results[0]);
    }).catch(function () {
      document.getElementById("ticker-hero-wrap").innerHTML = '<div class="empty">Could not load book data.</div>';
      document.getElementById("thesis-wrap").innerHTML = '<div class="empty">Could not load book data.</div>';
    });

    historyP.then(function (history) {
      renderHistory(history);
    }).catch(function () {
      document.getElementById("history-wrap").innerHTML = '<div class="empty">No price history on file for this name. History covers Quinn\'s book names.</div>';
    });

    renderTechRead();
    renderFundamentals();
    renderEarnings();
    renderNews();

    reportsP.then(function (index) {
      renderBrief(index);
    }).catch(function () {
      document.getElementById("brief-wrap").innerHTML = '<div class="empty">No brief on file yet for this name. ' +
        '<a href="research.html?t=' + encodeURIComponent(ticker) + '">Task the desk</a> and one lands here in minutes.</div>';
    });
  }

})();
</script>
